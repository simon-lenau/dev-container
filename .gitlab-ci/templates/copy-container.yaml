    #   crane copy 
    #   "${CI_REGISTRY_IMAGE}/${CI_COMMIT_BRANCH}/${IMAGE_NAME}:${IMAGE_VERS}"
    #   "${GITLAB_REGISTRY_MAIN_PATH}:${IMAGE_VERS}";
