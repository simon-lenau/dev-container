

.copy-container:
  extends: .master
  image:
    name: gcr.io/go-containerregistry/crane:debug
    entrypoint: [""]
  script:
    - !reference [.master, script]
    # Set Credentials
    - mkdir -p $HOME/.docker/
    - source ".gitlab-ci/set_credentials" >$HOME/.docker/config.json;
    - >-
      echo "FROM: $FROM";
      echo "TO: $TO";      
    - >-
      export GITLAB_REGISTRY_MAIN_PATH="${CI_REGISTRY_IMAGE}/${IMAGE_NAME}";
      export DOCKERHUB_REGISTRY_PATH="index.docker.io/simonlenau/dev-container:${IMAGE_NAME}"; 
    - >- 
      crane copy 
      "${FROM}"
      "${TO}";
