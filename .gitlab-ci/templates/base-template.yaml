.base-template:
  rules:
    - changes:
        paths:
          - dependencies/*
          - scripts/**/*
          - ssh_keys/*
          - .gitlab-ci/**/*
          - .gitlab-ci.yml
          - Dockerfile
  script:
    - >-
      # Set folders
      cd "${CI_PROJECT_DIR}";
      # Determine image information
      export IMAGE_NAME="$(echo ${FROM_IMAGE} | sed 's/.*\///' | sed 's/\:.*$//')";
      export IMAGE_VERS="$(echo ${FROM_IMAGE} | sed 's/.*\///' | sed 's/^.*\:\(.*\)$/\1/')"; 
      # Set credentials
      mkdir -p "$(dirname "${AUTH_FILE}")";
      touch "${AUTH_FILE}";
      ./.gitlab-ci/set_credentials "${AUTH_FILE}";
