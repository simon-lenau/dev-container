.base-template:
  rules:
    - changes:
        paths:
          - dependencies/*
          - scripts/**/*
          - ssh_keys/*
          - .gitlab-ci/**/*
          - .gitlab-ci.yml
          - Dockerfile
  script:
    - >-
      # Set Credentials
      outfile_dir="$(dirname "${AUTH_FILE}")";
    - printf "%s\n" "Creating ${outfile_dir}";
    - >-
      mkdir -p "${outfile_dir}";
      touch "${AUTH_FILE}";
      source ".gitlab-ci/set_credentials" > "${AUTH_FILE}";
      # Set folders
      cd "${CI_PROJECT_DIR}";
      # Determine image information
      export IMAGE_NAME="$(echo ${FROM_IMAGE} | sed 's/.*\///' | sed 's/\:.*$//')";
      export IMAGE_VERS="$(echo ${FROM_IMAGE} | sed 's/.*\///' | sed 's/^.*\:\(.*\)$/\1/')"; 
