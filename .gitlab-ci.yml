variables:
  R_IMAGE: index.docker.io/simonlenau/containr:4.3.3
  PYTHON_IMAGE: python:3.12

stages:
  # - container-build
  - container-forward

include:
  - local: '.gitlab-ci/templates/build-container.yaml'
  - local: '.gitlab-ci/templates/copy-container.yaml'

