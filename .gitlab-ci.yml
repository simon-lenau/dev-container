variables:
  FROM_IMAGE: projects.cispa.saarland:5005/c01sile/containr/r-ver:4.3.3

stages:
  - r-container-build

r-container-build:
  stage: r-container-build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  rules:
    - changes:
        paths:
          - dependencies/*
          - scripts/*
          - ssh_keys/*
          - Dockerfile
          - .gitlab-ci.yml
  script:
    # Set gitlab credentials
    - >-
      mkdir -p /kaniko/.docker;
      printf "{
          \"auths\": 
              {
                  \"${CI_REGISTRY}\": { 
                      \"auth\": \"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 -w 0)\"
                  }
              }
      }" \
      > /kaniko/.docker/config.json
    # Export package lists
    - >-
      cd ${CI_PROJECT_DIR};
      export ubuntu_packages=$(cat dependencies/Ubuntu 2>/dev/null || echo "");
      export r_packages=$(cat dependencies/R 2>/dev/null || echo "")
    # Determine image information
    - >-
      export image_name="$(echo ${FROM_IMAGE} | sed 's/.*\///' | sed 's/\:.*$//')";
      export image_vers="$(echo ${FROM_IMAGE} | sed 's/.*\///' | sed 's/^.*\:\(.*\)$/\1/')";
    # Check jq
    - >-
      echo "$CI_PROJECT_PATH";
      # if [ $( curl --header "PRIVATE-TOKEN: $private_token" "https://gitlab.com/api/v4/projects/$project/registry/repositories/$repo_id/tags/$tag" | jq -r '.name' ) == "$tag" ] ; then
