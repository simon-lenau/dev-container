variables:
  r_version: rocker/r-ver:4.3.2

stages:
  - r-container-build

r-container-build:
  stage: r-container-build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    # Set gitlab credentials
    - >-
      mkdir -p /kaniko/.docker;
      printf "{
          \"auths\": 
              {
                  \"${CI_REGISTRY}\": { 
                      \"auth\": \"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 -w 0)\"
                  }
              }
      }" \
      > /kaniko/.docker/config.json
    # Export package lists
    - >-
      cd ${CI_PROJECT_DIR};
      export ubuntu_packages=$(cat dependencies/Ubuntu 2>/dev/null || echo "");
      export r_packages=$(cat dependencies/R 2>/dev/null || echo "")
    # Run Kaniko to build container
    - >-
      echo "export WORKDIR=\"/${CI_PROJECT_NAME}/\""
      echo "export OUTDIR=\"/${CI_PROJECT_NAME}_output/\""
    - >-
      /kaniko/executor
      --context "./"
      --dockerfile "./Dockerfile"
      --build-arg "ubuntu_packages"="${ubuntu_packages}"
      --build-arg "r_packages"="${r_packages}"
      --build-arg "FROM_IMAGE"="projects.cispa.saarland:5005/c01sile/containr/r-ver:latest"
      --destination "${CI_REGISTRY_IMAGE}/dev-container:latest"